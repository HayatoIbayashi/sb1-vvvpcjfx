service: auth-signup-hostedui
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-northeast-1
  memorySize: 256
  timeout: 10
  vpc:
    subnetIds:
      - ${env:SUBNET_ID_1}
      - ${env:SUBNET_ID_2}
      - ${env:SUBNET_ID_3}
    securityGroupIds:
      - Ref: LambdaSecurityGroup
  httpApi:
    cors:
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Authorization
        - Content-Type
  environment:
    COGNITO_REGION: ${aws:region}
    COGNITO_CLIENT_ID: !Ref UserPoolClient
    COGNITO_USER_POOL_ID: !Ref UserPool
    DATABASE_URL: ${env:DATABASE_URL}
    STRIPE_WEBHOOK_SECRET: ${env:STRIPE_WEBHOOK_SECRET, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminDeleteUser
            - cognito-idp:AdminDeleteUserAttributes
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminListGroupsForUser
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminUpdateUserAttributes
            - cognito-idp:CreateGroup
            - cognito-idp:ListUsersInGroup
          Resource:
            - Fn::GetAtt:
                - UserPool
                - Arn

functions:
  authSignup:
    handler: lambda/auth-signup/dist/handler.handler
    events:
      - httpApi:
          path: /v1/auth/signup
          method: POST

  moviesList:
    handler: lambda/movies/dist/handler.handler
    environment:
      DATABASE_URL: ${env:DATABASE_URL}
    events:
      - httpApi:
          path: /v1/movies
          method: GET
      - httpApi:
          path: /v1/movies/{id}
          method: GET
      - httpApi:
          path: /v1/home
          method: GET
      - httpApi:
          path: /v1/admin/movies
          method: GET
      - httpApi:
          path: /v1/admin/movies
          method: POST
      - httpApi:
          path: /v1/admin/movies/{id}
          method: GET
      - httpApi:
          path: /v1/admin/movies/{id}
          method: PUT
      - httpApi:
          path: /v1/admin/movies/{id}
          method: DELETE
      - httpApi:
          path: /v1/admin/users
          method: GET
      - httpApi:
          path: /v1/admin/users/{id}
          method: PUT
      - httpApi:
          path: /v1/admin/users/{id}
          method: DELETE
      - httpApi:
          path: /v1/watchlist
          method: GET
      - httpApi:
          path: /v1/watchlist
          method: POST
      - httpApi:
          path: /v1/watchlist/{movieId}
          method: DELETE
      - httpApi:
          path: /v1/watch-history
          method: GET
      - httpApi:
          path: /v1/watch-history
          method: POST
      - httpApi:
          path: /v1/watch-history/{movieId}
          method: GET
      - httpApi:
          path: /v1/watch-history/{movieId}
          method: PATCH
      - httpApi:
          path: /v1/subscriptions/current
          method: GET
      - httpApi:
          path: /v1/subscription-plans
          method: GET
      - httpApi:
          path: /v1/stripe/webhook
          method: POST
      - httpApi:
          path: /v1/profile
          method: GET
      - httpApi:
          path: /v1/profile
          method: PUT

  adminAccounts:
    handler: lambda/admin-accounts/dist/handler.handler
    vpc: ~
    environment:
      COGNITO_REGION: ${aws:region}
      COGNITO_USER_POOL_ID: !Ref UserPool
    events:
      - httpApi:
          path: /v1/admin/admin-users
          method: GET
      - httpApi:
          path: /v1/admin/admin-users
          method: POST
      - httpApi:
          path: /v1/admin/admin-users/{id}
          method: PUT
      - httpApi:
          path: /v1/admin/admin-users/{id}
          method: DELETE

  billingPortal:
    handler: lambda/billing-portal/dist/handler.handler
    vpc: ~
    environment:
      STRIPE_SECRET_KEY: ${env:STRIPE_SECRET_KEY, ''}
      APP_BASE_URL: ${env:APP_BASE_URL, ''}
      STRIPE_BILLING_PORTAL_CONFIGURATION_ID: ${env:STRIPE_BILLING_PORTAL_CONFIGURATION_ID, ''}
    events:
      - httpApi:
          path: /v1/billing-portal/session
          method: POST
      - httpApi:
          path: /v1/subscriptions/checkout-session
          method: POST
      - httpApi:
          path: /v1/subscriptions/current
          method: DELETE

resources:
  Resources:
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Lambda SG for RDS access
        VpcId: ${env:VPC_ID}
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0
    CognitoIdpEndpointSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Interface endpoint SG for Cognito User Pools API
        VpcId: ${env:VPC_ID}
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            SourceSecurityGroupId:
              Ref: LambdaSecurityGroup
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0
    CognitoIdpVpcEndpoint:
      Type: AWS::EC2::VPCEndpoint
      Properties:
        VpcId: ${env:VPC_ID}
        ServiceName: com.amazonaws.${aws:region}.cognito-idp
        VpcEndpointType: Interface
        PrivateDnsEnabled: true
        SubnetIds:
          - ${env:SUBNET_ID_1}
          - ${env:SUBNET_ID_2}
          - ${env:SUBNET_ID_3}
        SecurityGroupIds:
          - Ref: CognitoIdpEndpointSecurityGroup
    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: auth-signup-user-pool
        AutoVerifiedAttributes: [email]
        UsernameAttributes: [email]
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: false
            RequireUppercase: false
            RequireNumbers: false
            RequireSymbols: false
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1
    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        UserPoolId: !Ref UserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        AllowedOAuthFlows:
          - code
        AllowedOAuthScopes:
          - phone
          - email
          - openid
          - aws.cognito.signin.user.admin
        AllowedOAuthFlowsUserPoolClient: true
        CallbackURLs:
          - http://localhost:5173/
        LogoutURLs:
          - http://localhost:5173/

    # 任意: 既存RDS SGに対するインバウンド許可（RDS_SG_ID を環境変数で渡した場合のみ有効にしてください）
    # RdsIngressFromLambda:
    #   Type: AWS::EC2::SecurityGroupIngress
    #   Properties:
    #     GroupId: ${env:RDS_SG_ID}
    #     SourceSecurityGroupId:
    #       Ref: LambdaSecurityGroup
    #     IpProtocol: tcp
    #     FromPort: 5432
    #     ToPort: 5432

plugins: []

package:
  patterns:
    - '!**'
    - 'lambda/auth-signup/dist/**'
    - 'lambda/admin-accounts/dist/**'
    - 'lambda/billing-portal/dist/**'
    - 'lambda/movies/dist/**'
