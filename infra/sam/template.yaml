AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Auth Signup (Hosted UI誘導) - SAM Template

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string
  VpcId:
    Type: String
    Description: Existing VPC Id
  SubnetIds:
    Type: CommaDelimitedList
    Description: Private Subnet Ids for Lambda (at least two)
  RdsSecurityGroupId:
    Type: String
    Default: ""
    Description: (Optional) Existing RDS Security Group Id to allow inbound from Lambda SG
  ExistingCognitoClientId:
    Type: String
    Default: ""
    Description: (Optional) Use existing Hosted UI App Client Id (set this when reusing an existing User Pool)
  ExistingCognitoUserPoolId:
    Type: String
    Default: ""
    Description: (Optional) Use existing User Pool Id for admin account operations
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: (Optional) Stripe secret key for billing portal session creation
  AppBaseUrl:
    Type: String
    Default: ""
    Description: (Optional) Base URL used when billing portal returnUrl is omitted
  StripeBillingPortalConfigurationId:
    Type: String
    Default: ""
    Description: (Optional) Existing Stripe billing portal configuration id
  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: (Optional) Stripe webhook signing secret

Conditions:
  HasRdsSg: !Not [!Equals [!Ref RdsSecurityGroupId, ""]]
  UseExistingCognito: !Not [!Equals [!Ref ExistingCognitoClientId, ""]]
  CreateCognito: !Equals [!Ref ExistingCognitoClientId, ""]

Resources:
  UserPool:
    Condition: CreateCognito
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: auth-signup-user-pool
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: false
          RequireUppercase: false
          RequireNumbers: false
          RequireSymbols: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Condition: CreateCognito
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - phone
        - email
        - openid
        - aws.cognito.signin.user.admin
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - http://localhost:5173/
      LogoutURLs:
        - http://localhost:5173/

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]
        AllowOrigins: ['*']

  AuthSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: auth-signup
      # ルートを CodeUri にし、ビルド成果物 dist/ と node_modules を一緒にデプロイする
      CodeUri: ../../lambda/auth-signup
      Handler: dist/handler.handler
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_CLIENT_ID: !If [UseExistingCognito, !Ref ExistingCognitoClientId, !Ref UserPoolClient]
          DATABASE_URL: !Ref DatabaseUrl
      Events:
        Signup:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/auth/signup
            Method: POST

  MoviesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: movies-list
      CodeUri: ../../lambda/movies
      Handler: dist/handler.handler
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
      Events:
        PublicMovies:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/movies
            Method: GET
        PublicMovieDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/movies/{id}
            Method: GET
        AdminMovies:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/movies
            Method: GET
        AdminMoviesCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/movies
            Method: POST
        AdminMovieDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/movies/{id}
            Method: GET
        AdminMovieUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/movies/{id}
            Method: PUT
        AdminMovieDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/movies/{id}
            Method: DELETE
        AdminUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/users
            Method: GET
        AdminUserUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/users/{id}
            Method: PUT
        AdminUserDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/users/{id}
            Method: DELETE
        WatchlistGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/watchlist
            Method: GET
        WatchlistPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/watchlist
            Method: POST
        WatchlistDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/watchlist/{movieId}
            Method: DELETE
        WatchHistoryGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/watch-history
            Method: GET
        WatchHistoryPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/watch-history
            Method: POST
        SubscriptionCurrentGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/subscriptions/current
            Method: GET
        SubscriptionPlansGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/subscription-plans
            Method: GET
        StripeWebhookPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/stripe/webhook
            Method: POST
        ProfileGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/profile
            Method: GET
        ProfilePut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/profile
            Method: PUT

  AdminAccountsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: admin-accounts
      CodeUri: ../../lambda/admin-accounts
      Handler: dist/handler.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminDeleteUserAttributes
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminListGroupsForUser
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:CreateGroup
                - cognito-idp:ListUsersInGroup
              Resource:
                - !If
                  - CreateCognito
                  - !GetAtt UserPool.Arn
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingCognitoUserPoolId}
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !If [CreateCognito, !Ref UserPool, !Ref ExistingCognitoUserPoolId]
      Events:
        AdminAccountList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/admin-users
            Method: GET
        AdminAccountCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/admin-users
            Method: POST
        AdminAccountUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/admin-users/{id}
            Method: PUT
        AdminAccountDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/admin/admin-users/{id}
            Method: DELETE

  BillingPortalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: billing-portal
      CodeUri: ../../lambda/billing-portal
      Handler: dist/handler.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          APP_BASE_URL: !Ref AppBaseUrl
          STRIPE_BILLING_PORTAL_CONFIGURATION_ID: !Ref StripeBillingPortalConfigurationId
      Events:
        BillingPortalSessionCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/billing-portal/session
            Method: POST
        SubscriptionCheckoutSessionCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/subscriptions/checkout-session
            Method: POST
        SubscriptionCurrentDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/subscriptions/current
            Method: DELETE

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda SG for RDS access
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RdsIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasRdsSg
    Properties:
      GroupId: !Ref RdsSecurityGroupId
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432

Outputs:
  ApiEndpoint:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Value: !If [CreateCognito, !Ref UserPool, !Ref ExistingCognitoUserPoolId]
  UserPoolClientId:
    Value: !If [UseExistingCognito, !Ref ExistingCognitoClientId, !Ref UserPoolClient]
  LambdaSecurityGroupId:
    Value: !Ref LambdaSecurityGroup
